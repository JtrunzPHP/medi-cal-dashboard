name: Update Medi-Cal Data

on:
  schedule:
    - cron: '0 10 15 * *'
  push:
    paths:
      - '.github/workflows/update-data.yml'
      - 'scripts/fetch_data.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes first
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Discover and download DHCS CSVs
        run: |
          mkdir -p tmp

          echo "=== Getting enrollment CSV URL from CKAN API ==="
          ENROLL_URL=$(python3 -c "
          import urllib.request, json
          req = urllib.request.Request(
            'https://data.chhs.ca.gov/api/3/action/package_show?id=medi-cal-managed-care-enrollment-report',
            headers={'User-Agent': 'Mozilla/5.0'}
          )
          data = json.loads(urllib.request.urlopen(req, timeout=30).read())
          for r in data['result']['resources']:
            if r.get('format','').upper() == 'CSV':
              print(r['url'])
              break
          ")
          echo "Enrollment URL: $ENROLL_URL"
          curl -L -o tmp/enrollment.csv -H "User-Agent: Mozilla/5.0" --retry 3 --max-time 300 "$ENROLL_URL"
          echo "Enrollment CSV size: $(wc -c < tmp/enrollment.csv) bytes"
          head -1 tmp/enrollment.csv

          echo ""
          echo "=== Getting language CSV URL from CKAN API ==="
          LANG_URL=$(python3 -c "
          import urllib.request, json
          req = urllib.request.Request(
            'https://data.chhs.ca.gov/api/3/action/package_show?id=medi-cal-certified-eligibles-with-demographics-by-month',
            headers={'User-Agent': 'Mozilla/5.0'}
          )
          data = json.loads(urllib.request.urlopen(req, timeout=30).read())
          for r in data['result']['resources']:
            name = (r.get('name','') + r.get('description','')).lower()
            if 'language' in name and r.get('format','').upper() == 'CSV':
              print(r['url'])
              break
          " 2>/dev/null || echo "")

          if [ -n "$LANG_URL" ]; then
            echo "Language URL: $LANG_URL"
            curl -L -o tmp/language.csv -H "User-Agent: Mozilla/5.0" --retry 3 --max-time 300 "$LANG_URL"
            echo "Language CSV size: $(wc -c < tmp/language.csv) bytes"
            head -1 tmp/language.csv
          else
            echo "Could not find language CSV URL"
          fi

      - name: Process CSVs into JSON
        run: python scripts/fetch_data.py

      - name: Commit and push data files
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "data: update Medi-Cal enrollment $(date +%Y-%m-%d)"
            git push
          fi
