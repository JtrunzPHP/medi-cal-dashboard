name: Update Medi-Cal Data

on:
  schedule:
    - cron: '0 10 15 * *'
  push:
    paths:
      - '.github/workflows/update-data.yml'
      - 'scripts/fetch_data.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download CSVs from DHCS
        run: |
          mkdir -p tmp
          echo "Downloading enrollment CSV..."
          curl -L -o tmp/enrollment.csv \
            -H "User-Agent: Mozilla/5.0" \
            "https://data.chhs.ca.gov/dataset/c6ccef54-e7a9-4ebd-b79a-850b72c4dd8c/resource/95358a7a-2c9d-41c6-a0e0-405a7e5c5f18/download/open-data-portal-managed-care-enrollment-count-february-2026.csv"
          echo "Enrollment CSV size: $(wc -c < tmp/enrollment.csv) bytes"

          echo "Downloading language CSV..."
          curl -L -o tmp/language.csv \
            -H "User-Agent: Mozilla/5.0" \
            "https://data.chhs.ca.gov/dataset/8c897320-ba87-4574-bc37-bae974191c35/resource/b698c8d7-aacd-43c6-a7dd-737ff5692284/download/t5_eligibility_by_primary_language_201001_202602.csv" || echo "Language CSV download failed (non-fatal)"
          echo "Language CSV size: $(wc -c < tmp/language.csv 2>/dev/null || echo 0) bytes"

      - name: Process CSVs into JSON
        run: python scripts/fetch_data.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "data: update Medi-Cal enrollment $(date +%Y-%m-%d)"
            git push
          fi
