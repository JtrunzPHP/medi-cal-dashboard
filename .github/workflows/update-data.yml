name: Update Medi-Cal Data

on:
  # Run on the 15th of every month at 10am UTC
  schedule:
    - cron: '0 10 15 * *'
  # Run when workflow or script changes
  push:
    paths:
      - '.github/workflows/update-data.yml'
      - 'scripts/fetch_data.py'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and process DHCS data
        run: python scripts/fetch_data.py

      - name: List output files
        run: |
          echo "=== data/ directory ==="
          ls -lh data/ || echo "No data directory"
          echo ""
          echo "=== File sizes ==="
          du -sh data/* 2>/dev/null || echo "No files"

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "data: update Medi-Cal enrollment & language $(date +%Y-%m-%d)"
            git push
          fi
