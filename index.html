<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#F9FBF9;color:#2D3B2F;font-size:13px}
::-webkit-scrollbar{height:6px;width:6px}
::-webkit-scrollbar-thumb{background:#8A9A8C;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,Fragment}=React;
const {LineChart,Line,BarChart,Bar,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,ComposedChart,ScatterChart,Scatter,ReferenceLine,Cell}=Recharts;

const P={green:"#1B5E20",gl:"#2E7D32",gs:"#4CAF50",gp:"#C8E6C9",gb:"#E8F5E9",w:"#FFF",g50:"#F9FBF9",g200:"#E0E7E0",g400:"#8A9A8C",g600:"#5A6B5C",g800:"#2D3B2F",red:"#D32F2F",rl:"#FFCDD2",or:"#F57C00",ol:"#FFE0B2",bl:"#1565C0",bll:"#BBDEFB",pu:"#7B1FA2",pl:"#E1BEE7",tl:"#00897B",gold:"#FFD600",moh:"#1565C0",cnc:"#F57C00",elv:"#7B1FA2",unh:"#00897B",hum:"#D32F2F"};
const pct=(n,d=1)=>n!=null?n.toFixed(d)+"%":"—";

const QD=[
{q:"Q1'23",mR:8050,cR:36400,mM:87.6,cH:87.0,mE:5.71,cE:2.11,mMb:5200,cMb:14800,mP:310,cP:68,enr:14900},
{q:"Q2'23",mR:8300,cR:37200,mM:88.0,cH:87.2,mE:5.85,cE:2.25,mMb:5250,cMb:14600,mP:335,cP:65,enr:14700},
{q:"Q3'23",mR:8600,cR:38100,mM:88.4,cH:87.5,mE:5.50,cE:2.15,mMb:5300,cMb:14200,mP:350,cP:62,enr:14400},
{q:"Q4'23",mR:9100,cR:39500,mM:88.8,cH:87.8,mE:5.20,cE:1.95,mMb:5350,cMb:13900,mP:370,cP:60,enr:14100},
{q:"Q1'24",mR:9446,cR:40200,mM:88.6,cH:87.6,mE:5.19,cE:2.36,mMb:5400,cMb:13600,mP:395,cP:72,enr:13800},
{q:"Q2'24",mR:9700,cR:40800,mM:88.8,cH:88.0,mE:5.25,cE:1.65,mMb:5500,cMb:13300,mP:360,cP:66,enr:13500},
{q:"Q3'24",mR:9694,cR:41400,mM:89.2,cH:89.2,mE:5.65,cE:1.62,mMb:5550,cMb:13100,mP:340,cP:58,enr:13200},
{q:"Q4'24",mR:10500,cR:40800,mM:89.8,cH:89.6,mE:4.44,cE:0.52,mMb:5533,cMb:12900,mP:305,cP:55,enr:13050},
{q:"Q1'25",mR:10600,cR:44700,mM:89.2,cH:87.5,mE:5.45,cE:1.42,mMb:5600,cMb:13000,mP:330,cP:60,enr:13100},
{q:"Q2'25",mR:10868,cR:48200,mM:90.4,cH:93.0,mE:4.75,cE:-3.88,mMb:5700,cMb:12800,mP:280,cP:42,enr:13000},
{q:"Q3'25",mR:10841,cR:50100,mM:92.6,cH:91.5,mE:1.51,cE:4.34,mMb:5650,cMb:12600,mP:220,cP:40,enr:12900},
{q:"Q4'25",mR:11400,cR:49700,mM:94.6,cH:94.3,mE:-3.15,cE:-1.19,mMb:5600,cMb:12500,mP:180,cP:37,enr:12800}
];
const LA=[{mo:"Jan'24",hn:1050,la:2380},{mo:"Apr'24",hn:1020,la:2310},{mo:"Jul'24",hn:990,la:2250},{mo:"Oct'24",hn:970,la:2210},{mo:"Jan'25",hn:960,la:2190},{mo:"Apr'25",hn:945,la:2160},{mo:"Jul'25",hn:930,la:2140},{mo:"Oct'25",hn:920,la:2120},{mo:"Jan'26",hn:910,la:2100},{mo:"Feb'26",hn:905,la:2090}];
const AQ=[{q:"Q1'24",mRx:12.5,cRx:11.8,bh:8.2},{q:"Q2'24",mRx:13.1,cRx:12.4,bh:8.8},{q:"Q3'24",mRx:13.8,cRx:13.0,bh:9.5},{q:"Q4'24",mRx:14.2,cRx:13.5,bh:10.1},{q:"Q1'25",mRx:14.8,cRx:14.1,bh:10.8},{q:"Q2'25",mRx:15.5,cRx:14.9,bh:11.5},{q:"Q3'25",mRx:16.0,cRx:15.4,bh:12.0},{q:"Q4'25",mRx:16.3,cRx:15.8,bh:12.3}];

function pcorr(x,y){const n=Math.min(x.length,y.length);if(n<3)return 0;let sx=0,sy=0,sxy=0,sx2=0,sy2=0;for(let i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];sy2+=y[i]*y[i];}const d=Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));return d===0?0:(n*sxy-sx*sy)/d;}
function lreg(x,y){const n=Math.min(x.length,y.length);let sx=0,sy=0,sxy=0,sx2=0;for(let i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];}const b=(n*sxy-sx*sy)/(n*sx2-sx*sx),a=(sy-b*sx)/n;let ssr=0,sst=0;const ym=sy/n;for(let i=0;i<n;i++){ssr+=(a+b*x[i]-ym)**2;sst+=(y[i]-ym)**2;}return{slope:b,r2:sst===0?0:ssr/sst};}

function useAn(){return useMemo(()=>{const mP=QD.map(d=>d.mP),cP=QD.map(d=>d.cP),en=QD.map(d=>d.enr);const mR=mP.slice(1).map((p,i)=>(p-mP[i])/mP[i]*100),cR=cP.slice(1).map((p,i)=>(p-cP[i])/cP[i]*100),eC=en.slice(1).map((e,i)=>(e-en[i])/en[i]*100),mC=QD.slice(1).map((x,i)=>x.mM-QD[i].mM),hC=QD.slice(1).map((x,i)=>x.cH-QD[i].cH);return{rMM:pcorr(mC,mR),rCH:pcorr(hC,cR),rEM:pcorr(eC,mR),rEC:pcorr(eC,cR),rgMM:lreg(QD.slice(1).map(x=>x.mM),mR),rgCH:lreg(QD.slice(1).map(x=>x.cH),cR),rgEN:lreg(eC,mR),sMOH:QD.slice(1).map((x,i)=>({mcr:x.mM,ret:mR[i],q:x.q})),sCNC:QD.slice(1).map((x,i)=>({hbr:x.cH,ret:cR[i],q:x.q}))};},[]);}

const S={
  page:{minHeight:"100vh"},
  hdr:{background:"linear-gradient(135deg,#1B5E20,#2E7D32)",color:"#fff",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"},
  tabs:{display:"flex",gap:1,background:"#fff",borderBottom:"2px solid #C8E6C9",padding:"0 10px",overflowX:"auto"},
  tab:(a)=>({padding:"8px 10px",cursor:"pointer",fontSize:10,fontWeight:a?700:500,color:a?"#1B5E20":"#5A6B5C",borderBottom:a?"3px solid #4CAF50":"3px solid transparent",whiteSpace:"nowrap"}),
  s:{padding:"12px 16px"},
  c:{background:"#fff",borderRadius:8,border:"1px solid #E0E7E0",padding:12,marginBottom:10,boxShadow:"0 1px 2px rgba(0,0,0,0.04)"},
  ct:{fontSize:13,fontWeight:700,color:"#1B5E20",marginBottom:3},
  cd:{fontSize:11,color:"#5A6B5C",lineHeight:1.5,marginBottom:10},
  kr:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10},
  k:(c)=>({flex:"1 1 120px",background:"#fff",borderRadius:6,border:"1px solid #E0E7E0",padding:"8px 10px",borderLeft:"4px solid "+(c||"#1B5E20")}),
  kl:{fontSize:9,color:"#5A6B5C",textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:600},
  kv:{fontSize:17,fontWeight:800,marginTop:1},
  ks:{fontSize:9,color:"#8A9A8C",marginTop:1},
  t:{width:"100%",borderCollapse:"collapse",fontSize:11},
  th:{textAlign:"left",padding:"6px 7px",borderBottom:"2px solid #C8E6C9",color:"#1B5E20",fontWeight:700,fontSize:9,textTransform:"uppercase"},
  td:{padding:"5px 7px",borderBottom:"1px solid #E0E7E0"},
  cb:(v)=>({display:"inline-block",padding:"2px 6px",borderRadius:4,background:v>0.5?"#4CAF50":v>0?"#C8E6C9":v>-0.5?"#FFE0B2":"#FFCDD2",fontWeight:700,fontSize:11}),
  sb:(t)=>{const m={bullish:{bg:"#E8F5E9",bd:"#4CAF50",c:"#1B5E20"},bearish:{bg:"#FFEBEE",bd:"#EF5350",c:"#B71C1C"},neutral:{bg:"#FFF8E1",bd:"#FFB300",c:"#E65100"}};const x=m[t]||m.neutral;return{padding:8,borderRadius:6,border:"1px solid "+x.bd,background:x.bg,color:x.c,marginBottom:6}},
  g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  bd:(bg)=>({display:"inline-block",padding:"2px 6px",borderRadius:8,background:bg,fontSize:9,fontWeight:600}),
};

const TABS=["Summary","Enrollment","Fundamentals","Correlations","Acuity","Disenrollment","Scenarios","Peers","Signals"];

function App(){
  const[tab,setTab]=useState(0);
  const an=useAn();
  const L=QD[QD.length-1];
  return React.createElement("div",{style:S.page},
    React.createElement("div",{style:S.hdr},
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:19,fontWeight:800}},"PARKMAN HEALTHCARE PARTNERS"),
        React.createElement("div",{style:{fontSize:10,opacity:0.8}},"CA Medi-Cal MCO Analytics — Proprietary Research")),
      React.createElement("div",{style:{textAlign:"right",fontSize:10,opacity:0.8}},"March 2026 | DHCS, SEC, CMS")),
    React.createElement("div",{style:S.tabs},TABS.map((t,i)=>React.createElement("div",{key:i,style:S.tab(tab===i),onClick:()=>setTab(i)},t))),
    React.createElement("div",{style:S.s},
      tab===0&&<T0 an={an} L={L}/>,tab===1&&<T1/>,tab===2&&<T2/>,tab===3&&<T3 an={an}/>,tab===4&&<T4/>,tab===5&&<T5/>,tab===6&&<T6/>,tab===7&&<T7/>,tab===8&&<T8/>),
    React.createElement("div",{style:{padding:"6px 16px",fontSize:8,color:"#8A9A8C",borderTop:"1px solid #E0E7E0",background:"#fff"}},"Disclaimer: Internal research only. Not investment advice. Data from SEC EDGAR, CA DHCS, CMS. Past performance ≠ future results."));
}

function T0({an,L}){return<Fragment>
<div style={S.c}><div style={S.ct}>Dashboard Overview</div><div style={S.cd}>This platform tracks CA Medi-Cal managed care enrollment alongside financials and stock performance of <b>Molina Healthcare (MOH)</b> and <b>Centene/Health Net (CNC)</b>, benchmarked against UNH, ELV, and HUM. The thesis: enrollment composition changes — disenrollment velocity, acuity shifts, county mix — are leading indicators of MCO earnings quality. The post-pandemic redetermination unwinding removed ~1.8M CA members, leaving a sicker pool that compressed margins industry-wide.</div></div>
<div style={S.kr}>
  <div style={S.k(P.moh)}><div style={S.kl}>MOH Stock</div><div style={{...S.kv,color:P.moh}}>${L.mP}</div><div style={S.ks}>MCR: {pct(L.mM)} | 52wk $121-$360</div></div>
  <div style={S.k(P.cnc)}><div style={S.kl}>CNC Stock</div><div style={{...S.kv,color:P.cnc}}>${L.cP}</div><div style={S.ks}>HBR: {pct(L.cH)} | 52wk $25-$66</div></div>
  <div style={S.k(P.green)}><div style={S.kl}>CA Medi-Cal</div><div style={{...S.kv,color:P.green}}>{(L.enr/1000).toFixed(1)}M</div><div style={S.ks}>Peak 15.0M → Down {((1-L.enr/QD[0].enr)*100).toFixed(1)}%</div></div>
</div>
<div style={S.c}><div style={S.ct}>Key Correlations (Pearson ρ, 12 qtrs)</div><div style={S.cd}>Strong inverse = rising MCR predicts stock decline. Foundation of the trading signal framework.</div>
<table style={S.t}><thead><tr><th style={S.th}>Pair</th><th style={S.th}>ρ</th><th style={S.th}>Signal</th></tr></thead><tbody>
{[["MOH MCR Δ → Return",an.rMM],["CNC HBR Δ → Return",an.rCH],["Enrollment Δ → MOH",an.rEM],["Enrollment Δ → CNC",an.rEC]].map(([l,v],i)=><tr key={i}><td style={S.td}>{l}</td><td style={S.td}><span style={S.cb(v)}>{v.toFixed(3)}</span></td><td style={S.td}>{v<-0.5?"Strong Inverse":v<-0.2?"Moderate Inverse":v<0.2?"Weak":"Positive"}</td></tr>)}
</tbody></table></div>
<div style={S.c}><div style={S.ct}>Stock Price vs MCR/HBR — 12 Quarter Trend</div><div style={S.cd}>Dual-axis: as MCR/HBR crossed ~90%, stock declines accelerated. Q4'25 spikes coincided with earnings misses.</div>
<ResponsiveContainer width="100%" height={250}><ComposedChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis dataKey="q" tick={{fontSize:9}} interval={1}/><YAxis yAxisId="p" tick={{fontSize:9}}/><YAxis yAxisId="m" orientation="right" tick={{fontSize:9}} domain={[85,96]}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/>
<Line yAxisId="p" dataKey="mP" stroke={P.moh} strokeWidth={2} name="MOH $" dot={{r:2}}/><Line yAxisId="p" dataKey="cP" stroke={P.cnc} strokeWidth={2} name="CNC $" dot={{r:2}}/>
<Line yAxisId="m" dataKey="mM" stroke={P.moh} strokeWidth={2} strokeDasharray="5 5" name="MOH MCR"/><Line yAxisId="m" dataKey="cH" stroke={P.cnc} strokeWidth={2} strokeDasharray="5 5" name="CNC HBR"/>
</ComposedChart></ResponsiveContainer></div></Fragment>;}

function T1(){return<Fragment>
<div style={S.c}><div style={S.ct}>CA Medi-Cal Enrollment Tracker</div><div style={S.cd}><b>What:</b> Total managed care enrollment across CA from DHCS monthly data. <b>Why:</b> Each member = PMPM capitation revenue. The 2023-24 unwinding removed ~1.8M healthier members, raising acuity. <b>Watch:</b> Whether floor holds at ~12.8M given CA's 2026 asset limit reinstatement and immigration enrollment changes.</div>
<ResponsiveContainer width="100%" height={230}><AreaChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis dataKey="q" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}} domain={[12000,15500]} tickFormatter={v=>(v/1000).toFixed(1)+"M"}/><Tooltip contentStyle={{fontSize:10}} formatter={v=>[(v/1000).toFixed(2)+"M",""]}/><Area type="monotone" dataKey="enr" fill="#C8E6C9" stroke="#1B5E20" strokeWidth={2}/><ReferenceLine y={15000} stroke="#8A9A8C" strokeDasharray="3 3"/></AreaChart></ResponsiveContainer></div>
<div style={S.c}><div style={S.ct}>LA County — Health Net (CNC) vs L.A. Care</div><div style={S.cd}>LA = 23% of CA Medi-Cal (~3M members). Two-Plan model: only Health Net (CNC) and L.A. Care. <b>Molina has NO LA exposure.</b> Health Net share declining faster than L.A. Care — competitive/satisfaction signal.</div>
<ResponsiveContainer width="100%" height={200}><BarChart data={LA}><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis dataKey="mo" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}} tickFormatter={v=>v+"K"}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/><Bar dataKey="hn" fill={P.cnc} name="Health Net" stackId="a"/><Bar dataKey="la" fill={P.gs} name="L.A. Care" stackId="a"/></BarChart></ResponsiveContainer></div>
</Fragment>;}

function T2(){
const pm=QD.map(r=>({q:r.q,mPM:r.mMb>0?Math.round((r.mR*1e6)/(r.mMb*1000*3)):0,cPM:r.cMb>0?Math.round((r.cR*1e6)/(r.cMb*1000*3)):0}));
return<Fragment>
<div style={S.c}><div style={S.ct}>Quarterly Financials</div><div style={S.cd}>When both MCR/HBR move together = systemic (post-redetermination acuity). Divergence = company-specific. In 2025 both rose together — confirming industry-wide pressure, limiting pair-trade hedge value.</div>
<div style={{overflowX:"auto"}}><table style={S.t}><thead><tr><th style={S.th}>Qtr</th><th style={S.th}>MOH Rev</th><th style={S.th}>CNC Rev</th><th style={S.th}>MOH MCR</th><th style={S.th}>CNC HBR</th><th style={S.th}>MOH EPS</th><th style={S.th}>CNC EPS</th><th style={S.th}>MOH $</th><th style={S.th}>CNC $</th></tr></thead>
<tbody>{QD.map((r,i)=><tr key={i} style={{background:i%2===0?"#F9FBF9":"transparent"}}><td style={{...S.td,fontWeight:700}}>{r.q}</td><td style={S.td}>${(r.mR/1000).toFixed(1)}B</td><td style={S.td}>${(r.cR/1000).toFixed(1)}B</td>
<td style={{...S.td,color:r.mM>91?"#D32F2F":r.mM>89?"#F57C00":"#4CAF50",fontWeight:700}}>{pct(r.mM)}</td><td style={{...S.td,color:r.cH>91?"#D32F2F":r.cH>89?"#F57C00":"#4CAF50",fontWeight:700}}>{pct(r.cH)}</td>
<td style={{...S.td,color:r.mE<0?"#D32F2F":"#2D3B2F",fontWeight:700}}>${r.mE.toFixed(2)}</td><td style={{...S.td,color:r.cE<0?"#D32F2F":"#2D3B2F",fontWeight:700}}>${r.cE.toFixed(2)}</td>
<td style={S.td}>${r.mP}</td><td style={S.td}>${r.cP}</td></tr>)}</tbody></table></div></div>
<div style={S.g2}>
<div style={S.c}><div style={S.ct}>PMPM Revenue</div><div style={S.cd}>Rising PMPM = rate increases flowing through. When PMPM growth exceeds cost trend, margins recover. Both MCOs receiving 4.5-5.5% rate increases from states in 2025-2026.</div>
<ResponsiveContainer width="100%" height={190}><LineChart data={pm}><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis dataKey="q" tick={{fontSize:8}} interval={2}/><YAxis tick={{fontSize:8}} tickFormatter={v=>"$"+v}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/><Line dataKey="mPM" stroke={P.moh} strokeWidth={2} name="MOH" dot={{r:2}}/><Line dataKey="cPM" stroke={P.cnc} strokeWidth={2} name="CNC" dot={{r:2}}/></LineChart></ResponsiveContainer></div>
<div style={S.c}><div style={S.ct}>EPS Trajectory</div><div style={S.cd}>MOH: ~$5.50/qtr → Q4'25 loss. 2026 guide: ~$5 adj. CNC: >$3. Any beat on these lowered bars = relief rally potential.</div>
<ResponsiveContainer width="100%" height={190}><ComposedChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis dataKey="q" tick={{fontSize:8}} interval={2}/><YAxis tick={{fontSize:8}}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/><ReferenceLine y={0} stroke="#D32F2F" strokeDasharray="3 3"/><Bar dataKey="mE" fill={P.moh} name="MOH" barSize={10} opacity={0.7}/><Bar dataKey="cE" fill={P.cnc} name="CNC" barSize={10} opacity={0.7}/></ComposedChart></ResponsiveContainer></div>
</div></Fragment>;}

function T3({an}){return<Fragment>
<div style={S.c}><div style={S.ct}>MCR/HBR → Stock Return (Core Trading Signal)</div>
<div style={S.cd}><b>Most actionable relationship.</b> MOH ρ = {an.rMM.toFixed(3)}. Regression: +1pp MCR ≈ {an.rgMM.slope.toFixed(1)}% stock move. R² = {an.rgMM.r2.toFixed(3)}. Market reacts most violently to MCR surprises &gt;50bps above consensus — stocks gap 5-15% on earnings day.</div>
<div style={S.g2}>{[["MOH",an.sMOH,"mcr",P.moh,an.rMM],["CNC",an.sCNC,"hbr",P.cnc,an.rCH]].map(([nm,data,xk,clr,rho],idx)=><div key={idx}>
<div style={{fontSize:10,fontWeight:700,color:clr,marginBottom:4}}>{nm}: ρ = {rho.toFixed(3)}</div>
<ResponsiveContainer width="100%" height={190}><ScatterChart><CartesianGrid strokeDasharray="3 3" stroke="#E0E7E0"/><XAxis type="number" dataKey={xk} tick={{fontSize:8}} domain={[85,96]}/><YAxis type="number" dataKey="ret" tick={{fontSize:8}}/><Tooltip content={({payload:p})=>p&&p[0]?<div style={{background:"#fff",border:"1px solid #ddd",padding:4,fontSize:9}}><b>{p[0].payload.q}</b><br/>{xk.toUpperCase()}: {p[0].payload[xk]}% | Ret: {p[0].payload.ret.toFixed(1)}%</div>:null}/><Scatter data={data} fill={clr} r={4}/><ReferenceLine y={0} stroke="#8A9A8C" strokeDasharray="3 3"/></ScatterChart></ResponsiveContainer></div>)}</div></div>
<div style={S.c}><div style={S.ct}>Regression Summary</div>
<table style={S.t}><thead><tr><th style={S.th}>Model</th><th style={S.th}>Slope</th><th style={S.th}>R²</th><th style={S.th}>Interpretation</th></tr></thead><tbody>
