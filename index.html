<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkman Healthcare Partners — CA Medi-Cal MCO Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#F9FBF9;color:#2D3B2F;font-size:13px}
.hdr{background:linear-gradient(135deg,#1B5E20,#2E7D32);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:19px;font-weight:800;letter-spacing:-0.5px}
.hdr .sub{font-size:10px;opacity:0.8;margin-top:2px}
.tabs{display:flex;gap:1px;background:#fff;border-bottom:2px solid #C8E6C9;padding:0 10px;overflow-x:auto}
.tab{padding:8px 11px;cursor:pointer;font-size:10px;font-weight:500;color:#5A6B5C;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{font-weight:700;color:#1B5E20;border-bottom-color:#4CAF50}
.tab:hover{color:#1B5E20}
.sect{padding:12px 16px}
.card{background:#fff;border-radius:8px;border:1px solid #E0E7E0;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.ct{font-size:13px;font-weight:700;color:#1B5E20;margin-bottom:3px}
.cd{font-size:11px;color:#5A6B5C;line-height:1.5;margin-bottom:10px}
.kr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.kpi{flex:1 1 120px;background:#fff;border-radius:6px;border:1px solid #E0E7E0;padding:8px 10px}
.kpi .l{font-size:9px;color:#5A6B5C;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.kpi .v{font-size:17px;font-weight:800;margin-top:1px}
.kpi .s{font-size:9px;color:#8A9A8C;margin-top:1px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 7px;border-bottom:2px solid #C8E6C9;color:#1B5E20;font-weight:700;font-size:9px;text-transform:uppercase}
td{padding:5px 7px;border-bottom:1px solid #E0E7E0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sb{padding:8px;border-radius:6px;margin-bottom:6px;border:1px solid}
.sb.bull{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20}
.sb.bear{background:#FFEBEE;border-color:#EF5350;color:#B71C1C}
.sb.neut{background:#FFF8E1;border-color:#FFB300;color:#E65100}
.bd{display:inline-block;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:600}
.footer{padding:6px 16px;font-size:8px;color:#8A9A8C;border-top:1px solid #E0E7E0;background:#fff}
@media(max-width:700px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const {LineChart,Line,BarChart,Bar,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,ComposedChart,ScatterChart,Scatter,ReferenceLine,Cell}=Recharts;

const C={moh:"#1565C0",cnc:"#F57C00",elv:"#7B1FA2",unh:"#00897B",hum:"#D32F2F",grn:"#1B5E20",gs:"#4CAF50",gp:"#C8E6C9",gb:"#E8F5E9",red:"#D32F2F",or:"#F57C00",g200:"#E0E7E0",g400:"#8A9A8C",g600:"#5A6B5C",g800:"#2D3B2F",bl:"#BBDEFB",ol:"#FFE0B2",rl:"#FFCDD2",gold:"#FFD600",pu:"#7B1FA2",pl:"#E1BEE7"};
const pct=(n,d=1)=>n!=null?n.toFixed(d)+"%":"--";

const QD=[
{q:"Q1'23",mR:8050,cR:36400,mM:87.6,cH:87.0,mE:5.71,cE:2.11,mP:310,cP:68,enr:14900},
{q:"Q2'23",mR:8300,cR:37200,mM:88.0,cH:87.2,mE:5.85,cE:2.25,mP:335,cP:65,enr:14700},
{q:"Q3'23",mR:8600,cR:38100,mM:88.4,cH:87.5,mE:5.50,cE:2.15,mP:350,cP:62,enr:14400},
{q:"Q4'23",mR:9100,cR:39500,mM:88.8,cH:87.8,mE:5.20,cE:1.95,mP:370,cP:60,enr:14100},
{q:"Q1'24",mR:9446,cR:40200,mM:88.6,cH:87.6,mE:5.19,cE:2.36,mP:395,cP:72,enr:13800},
{q:"Q2'24",mR:9700,cR:40800,mM:88.8,cH:88.0,mE:5.25,cE:1.65,mP:360,cP:66,enr:13500},
{q:"Q3'24",mR:9694,cR:41400,mM:89.2,cH:89.2,mE:5.65,cE:1.62,mP:340,cP:58,enr:13200},
{q:"Q4'24",mR:10500,cR:40800,mM:89.8,cH:89.6,mE:4.44,cE:0.52,mP:305,cP:55,enr:13050},
{q:"Q1'25",mR:10600,cR:44700,mM:89.2,cH:87.5,mE:5.45,cE:1.42,mP:330,cP:60,enr:13100},
{q:"Q2'25",mR:10868,cR:48200,mM:90.4,cH:93.0,mE:4.75,cE:-3.88,mP:280,cP:42,enr:13000},
{q:"Q3'25",mR:10841,cR:50100,mM:92.6,cH:91.5,mE:1.51,cE:4.34,mP:220,cP:40,enr:12900},
{q:"Q4'25",mR:11400,cR:49700,mM:94.6,cH:94.3,mE:-3.15,cE:-1.19,mP:180,cP:37,enr:12800}
];

const LA=[
{mo:"Jan'24",hn:1050,la:2380},{mo:"Apr'24",hn:1020,la:2310},{mo:"Jul'24",hn:990,la:2250},
{mo:"Oct'24",hn:970,la:2210},{mo:"Jan'25",hn:960,la:2190},{mo:"Apr'25",hn:945,la:2160},
{mo:"Jul'25",hn:930,la:2140},{mo:"Oct'25",hn:920,la:2120},{mo:"Jan'26",hn:910,la:2100},{mo:"Feb'26",hn:905,la:2090}
];

const AQ=[
{q:"Q1'24",mRx:12.5,cRx:11.8,bh:8.2},{q:"Q2'24",mRx:13.1,cRx:12.4,bh:8.8},
{q:"Q3'24",mRx:13.8,cRx:13.0,bh:9.5},{q:"Q4'24",mRx:14.2,cRx:13.5,bh:10.1},
{q:"Q1'25",mRx:14.8,cRx:14.1,bh:10.8},{q:"Q2'25",mRx:15.5,cRx:14.9,bh:11.5},
{q:"Q3'25",mRx:16.0,cRx:15.4,bh:12.0},{q:"Q4'25",mRx:16.3,cRx:15.8,bh:12.3}
];

function pcorr(x,y){var n=Math.min(x.length,y.length);if(n<3)return 0;var sx=0,sy=0,sxy=0,sx2=0,sy2=0;for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];sy2+=y[i]*y[i];}var d=Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));return d===0?0:(n*sxy-sx*sy)/d;}
function lreg(x,y){var n=Math.min(x.length,y.length);var sx=0,sy=0,sxy=0,sx2=0;for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];}var b=(n*sxy-sx*sy)/(n*sx2-sx*sx);var a=(sy-b*sx)/n;var ssr=0,sst=0,ym=sy/n;for(var i=0;i<n;i++){ssr+=(a+b*x[i]-ym)*(a+b*x[i]-ym);sst+=(y[i]-ym)*(y[i]-ym);}return{slope:b,r2:sst===0?0:ssr/sst};}

function calcAn(){
  var mP=QD.map(function(d){return d.mP}),cP=QD.map(function(d){return d.cP}),en=QD.map(function(d){return d.enr});
  var mRet=mP.slice(1).map(function(p,i){return(p-mP[i])/mP[i]*100});
  var cRet=cP.slice(1).map(function(p,i){return(p-cP[i])/cP[i]*100});
  var eChg=en.slice(1).map(function(e,i){return(e-en[i])/en[i]*100});
  var mMC=QD.slice(1).map(function(x,i){return x.mM-QD[i].mM});
  var cHC=QD.slice(1).map(function(x,i){return x.cH-QD[i].cH});
  return{
    rMM:pcorr(mMC,mRet),rCH:pcorr(cHC,cRet),rEM:pcorr(eChg,mRet),rEC:pcorr(eChg,cRet),
    regMM:lreg(QD.slice(1).map(function(x){return x.mM}),mRet),
    regCH:lreg(QD.slice(1).map(function(x){return x.cH}),cRet),
    regEN:lreg(eChg,mRet),
    sMOH:QD.slice(1).map(function(x,i){return{mcr:x.mM,ret:mRet[i],q:x.q}}),
    sCNC:QD.slice(1).map(function(x,i){return{hbr:x.cH,ret:cRet[i],q:x.q}})
  };
}

var TABS=["Summary","Enrollment","Fundamentals","Correlations","Acuity","Disenrollment","Scenarios","Peers","Signals"];

function App(){
  var tabState=useState(0);
  var tab=tabState[0], setTab=tabState[1];
  var an=useMemo(calcAn,[]);
  var L=QD[QD.length-1];
  return React.createElement("div",null,
    React.createElement("div",{className:"hdr"},
      React.createElement("div",null,
        React.createElement("h1",null,"PARKMAN HEALTHCARE PARTNERS"),
        React.createElement("div",{className:"sub"},"CA Medi-Cal MCO Analytics Platform")
      ),
      React.createElement("div",{style:{textAlign:"right",fontSize:10,opacity:0.8}},"March 2026 | DHCS, SEC, CMS")
    ),
    React.createElement("div",{className:"tabs"},
      TABS.map(function(t,i){return React.createElement("div",{key:i,className:"tab"+(tab===i?" on":""),onClick:function(){setTab(i)}},t)})
    ),
    React.createElement("div",{className:"sect"},
      tab===0?React.createElement(T0,{an:an,L:L}):null,
      tab===1?React.createElement(T1,null):null,
      tab===2?React.createElement(T2,null):null,
      tab===3?React.createElement(T3,{an:an}):null,
      tab===4?React.createElement(T4,null):null,
      tab===5?React.createElement(T5,null):null,
      tab===6?React.createElement(T6,null):null,
      tab===7?React.createElement(T7,null):null,
      tab===8?React.createElement(T8,null):null
    ),
    React.createElement("div",{className:"footer"},React.createElement("b",null,"Disclaimer:")," Internal research only. Not investment advice. MOH=Molina, CNC=Centene/Health Net, ELV=Elevance, UNH=UnitedHealth, HUM=Humana.")
  );
}

function T0(props){
  var an=props.an, L=props.L;
  return <div>
    <div className="card"><div className="ct">Dashboard Overview</div>
    <div className="cd">This platform tracks CA Medi-Cal managed care enrollment alongside financials and stock performance of <b>Molina Healthcare (MOH)</b> and <b>Centene/Health Net (CNC)</b>, with peer benchmarking against UNH, ELV, and HUM. The thesis: enrollment composition changes are leading indicators of MCO earnings quality. The post-pandemic redetermination unwinding removed ~1.8M CA members, leaving a sicker pool that compressed margins industry-wide.</div></div>
    <div className="kr">
      <div className="kpi" style={{borderLeft:"4px solid "+C.moh}}><div className="l">MOH Stock</div><div className="v" style={{color:C.moh}}>${L.mP}</div><div className="s">MCR: {pct(L.mM)} | 52wk: $121-$360</div></div>
      <div className="kpi" style={{borderLeft:"4px solid "+C.cnc}}><div className="l">CNC Stock</div><div className="v" style={{color:C.cnc}}>${L.cP}</div><div className="s">HBR: {pct(L.cH)} | 52wk: $25-$66</div></div>
      <div className="kpi" style={{borderLeft:"4px solid "+C.grn}}><div className="l">CA Medi-Cal</div><div className="v" style={{color:C.grn}}>{(L.enr/1000).toFixed(1)}M</div><div className="s">Peak 15.0M, down {((1-L.enr/QD[0].enr)*100).toFixed(1)}%</div></div>
    </div>
    <div className="card"><div className="ct">Key Correlations (Pearson rho)</div>
    <table><thead><tr><th>Pair</th><th>rho</th><th>Signal</th></tr></thead><tbody>
      <tr><td>MOH MCR chg - Return</td><td><b>{an.rMM.toFixed(3)}</b></td><td>{an.rMM<-0.5?"Strong Inverse":"Moderate"}</td></tr>
      <tr><td>CNC HBR chg - Return</td><td><b>{an.rCH.toFixed(3)}</b></td><td>{an.rCH<-0.5?"Strong Inverse":"Moderate"}</td></tr>
      <tr><td>Enrollment chg - MOH</td><td><b>{an.rEM.toFixed(3)}</b></td><td>{an.rEM<-0.2?"Inverse":"Weak"}</td></tr>
      <tr><td>Enrollment chg - CNC</td><td><b>{an.rEC.toFixed(3)}</b></td><td>{an.rEC<-0.2?"Inverse":"Weak"}</td></tr>
    </tbody></table></div>
    <div className="card"><div className="ct">Stock Price vs MCR/HBR -- 12 Quarters</div>
    <div className="cd">As MCR/HBR crossed ~90%, stock prices accelerated downward. Q4'25 spikes coincided with earnings misses.</div>
    <ResponsiveContainer width="100%" height={250}><ComposedChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="q" tick={{fontSize:9}} interval={1}/><YAxis yAxisId="p" tick={{fontSize:9}}/><YAxis yAxisId="m" orientation="right" tick={{fontSize:9}} domain={[85,96]}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/>
      <Line yAxisId="p" dataKey="mP" stroke={C.moh} strokeWidth={2} name="MOH $" dot={{r:2}}/><Line yAxisId="p" dataKey="cP" stroke={C.cnc} strokeWidth={2} name="CNC $" dot={{r:2}}/>
      <Line yAxisId="m" dataKey="mM" stroke={C.moh} strokeWidth={2} strokeDasharray="5 5" name="MOH MCR"/><Line yAxisId="m" dataKey="cH" stroke={C.cnc} strokeWidth={2} strokeDasharray="5 5" name="CNC HBR"/>
    </ComposedChart></ResponsiveContainer></div>
  </div>;
}

function T1(){
  return <div>
    <div className="card"><div className="ct">CA Medi-Cal Enrollment Tracker</div>
    <div className="cd"><b>What:</b> Total managed care enrollment across CA. <b>Why:</b> Each member = PMPM revenue. The 2023-24 unwinding removed ~1.8M healthier members, raising acuity. <b>Watch:</b> Floor at ~12.8M given 2026 asset limit reinstatement and immigration restrictions.</div>
    <ResponsiveContainer width="100%" height={230}><AreaChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="q" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}} domain={[12000,15500]} tickFormatter={function(v){return (v/1000).toFixed(1)+"M"}}/><Tooltip contentStyle={{fontSize:10}}/>
      <Area type="monotone" dataKey="enr" fill={C.gp} stroke={C.grn} strokeWidth={2}/>
    </AreaChart></ResponsiveContainer></div>
    <div className="card"><div className="ct">LA County -- Health Net (CNC) vs L.A. Care</div>
    <div className="cd"><b>Why:</b> LA = 23% of CA Medi-Cal. Two-Plan model: only Health Net (CNC) and L.A. Care. Molina has NO LA exposure.</div>
    <ResponsiveContainer width="100%" height={200}><BarChart data={LA}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="mo" tick={{fontSize:9}}/><YAxis tick={{fontSize:9}} tickFormatter={function(v){return v+"K"}}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/>
      <Bar dataKey="hn" fill={C.cnc} name="Health Net" stackId="a"/><Bar dataKey="la" fill={C.gs} name="L.A. Care" stackId="a"/>
    </BarChart></ResponsiveContainer></div>
  </div>;
}

function T2(){
  return <div>
    <div className="card"><div className="ct">Quarterly Financials</div>
    <div className="cd">When both MCR/HBR move together = systemic. When they diverge = company-specific. In 2025 both rose = industry-wide.</div>
    <div style={{overflowX:"auto"}}><table><thead><tr><th>Qtr</th><th>MOH Rev</th><th>CNC Rev</th><th>MOH MCR</th><th>CNC HBR</th><th>MOH EPS</th><th>CNC EPS</th><th>MOH $</th><th>CNC $</th></tr></thead>
      <tbody>{QD.map(function(r,i){return <tr key={i} style={{background:i%2===0?"#F9FBF9":"transparent"}}><td style={{fontWeight:700}}>{r.q}</td><td>${(r.mR/1000).toFixed(1)}B</td><td>${(r.cR/1000).toFixed(1)}B</td>
        <td style={{color:r.mM>91?C.red:r.mM>89?C.or:C.gs,fontWeight:700}}>{pct(r.mM)}</td><td style={{color:r.cH>91?C.red:r.cH>89?C.or:C.gs,fontWeight:700}}>{pct(r.cH)}</td>
        <td style={{color:r.mE<0?C.red:C.g800,fontWeight:700}}>${r.mE.toFixed(2)}</td><td style={{color:r.cE<0?C.red:C.g800,fontWeight:700}}>${r.cE.toFixed(2)}</td>
        <td>${r.mP}</td><td>${r.cP}</td></tr>})}</tbody></table></div></div>
    <div className="g2">
      <div className="card"><div className="ct">EPS Trajectory</div>
      <ResponsiveContainer width="100%" height={190}><ComposedChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="q" tick={{fontSize:8}} interval={2}/><YAxis tick={{fontSize:8}}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/>
        <ReferenceLine y={0} stroke={C.red} strokeDasharray="3 3"/><Bar dataKey="mE" fill={C.moh} name="MOH" barSize={10} opacity={0.7}/><Bar dataKey="cE" fill={C.cnc} name="CNC" barSize={10} opacity={0.7}/>
      </ComposedChart></ResponsiveContainer></div>
      <div className="card"><div className="ct">MCR/HBR Trend</div>
      <ResponsiveContainer width="100%" height={190}><LineChart data={QD}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="q" tick={{fontSize:8}} interval={2}/><YAxis tick={{fontSize:8}} domain={[85,96]}/><Tooltip contentStyle={{fontSize:10}}/><Legend wrapperStyle={{fontSize:9}}/>
        <Line dataKey="mM" stroke={C.moh} strokeWidth={2} name="MOH MCR" dot={{r:2}}/><Line dataKey="cH" stroke={C.cnc} strokeWidth={2} name="CNC HBR" dot={{r:2}}/>
        <ReferenceLine y={88} stroke={C.gs} strokeDasharray="5 5"/><ReferenceLine y={91} stroke={C.red} strokeDasharray="5 5"/>
      </LineChart></ResponsiveContainer></div>
    </div>
  </div>;
}

function T3(props){
  var an=props.an;
  return <div>
    <div className="card"><div className="ct">MCR/HBR to Stock Return -- Core Signal</div>
    <div className="cd"><b>Most actionable relationship.</b> MOH rho = {an.rMM.toFixed(3)}. Slope: +1pp MCR = {an.regMM.slope.toFixed(1)}% stock. R2 = {an.regMM.r2.toFixed(3)}.</div>
    <div className="g2">
      <div><div style={{fontSize:10,fontWeight:700,color:C.moh,marginBottom:4}}>MOH: rho = {an.rMM.toFixed(3)}</div>
        <ResponsiveContainer width="100%" height={190}><ScatterChart><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis type="number" dataKey="mcr" tick={{fontSize:8}} domain={[85,96]}/><YAxis type="number" dataKey="ret" tick={{fontSize:8}}/><Tooltip/>
          <Scatter data={an.sMOH} fill={C.moh} r={4}/><ReferenceLine y={0} stroke={C.g400} strokeDasharray="3 3"/>
        </ScatterChart></ResponsiveContainer></div>
      <div><div style={{fontSize:10,fontWeight:700,color:C.cnc,marginBottom:4}}>CNC: rho = {an.rCH.toFixed(3)}</div>
        <ResponsiveContainer width="100%" height={190}><ScatterChart><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis type="number" dataKey="hbr" tick={{fontSize:8}} domain={[85,96]}/><YAxis type="number" dataKey="ret" tick={{fontSize:8}}/><Tooltip/>
          <Scatter data={an.sCNC} fill={C.cnc} r={4}/><ReferenceLine y={0} stroke={C.g400} strokeDasharray="3 3"/>
        </ScatterChart></ResponsiveContainer></div>
    </div></div>
    <div className="card"><div className="ct">Regression Summary</div>
    <table><thead><tr><th>Model</th><th>Slope</th><th>R2</th><th>Read</th></tr></thead><tbody>
      <tr><td>MOH MCR to Ret</td><td><b>{an.regMM.slope.toFixed(3)}</b></td><td>{an.regMM.r2.toFixed(3)}</td><td>+1pp MCR = {an.regMM.slope.toFixed(1)}% stock</td></tr>
      <tr><td>CNC HBR to Ret</td><td><b>{an.regCH.slope.toFixed(3)}</b></td><td>{an.regCH.r2.toFixed(3)}</td><td>+1pp HBR = {an.regCH.slope.toFixed(1)}% stock</td></tr>
      <tr><td>Enrollment to MOH</td><td><b>{an.regEN.slope.toFixed(3)}</b></td><td>{an.regEN.r2.toFixed(3)}</td><td>-1% enroll = {Math.abs(an.regEN.slope).toFixed(1)}% decline</td></tr>
    </tbody></table></div>
  </div>;
}

function T4(){
  return <div>
    <div className="card"><div className="ct">Acuity Proxy Analysis</div>
    <div className="cd"><b>Acuity = member sickness.</b> Proxies: specialty Rx (GLP-1s), behavioral health (#1 cost driver 2025), LTSS. Flywheel: healthy leave, acuity rises, MCR up, rates lag 12-18mo, margin crushed, stock falls. Now in "rates catching up" phase.</div></div>
    <div className="g2">
      <div className="card"><div className="ct">Specialty Rx PMPM</div>
      <ResponsiveContainer width="100%" height={170}><LineChart data={AQ}><CartesianGrid strokeDasharray="3 3" stroke={C.g200}/><XAxis dataKey="q" tick={{fontSize:8}}/><YAxis tick={{fontSize:8}} domain={[10,18]}/><Tooltip contentStyle={{fontSize:9}}/><Legend wrapperStyle={{fontSize:9}}/>
