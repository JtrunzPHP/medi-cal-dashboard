/* ══════════════════════════════════════════
   MATH — Pearson Correlation & OLS Regression
   ══════════════════════════════════════════ */
function pcorr(x,y){
  var n=Math.min(x.length,y.length);
  if(n<3) return 0;
  var sx=0,sy=0,sxy=0,sx2=0,sy2=0;
  for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];sy2+=y[i]*y[i];}
  var den=Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));
  return den===0?0:(n*sxy-sx*sy)/den;
}
function lreg(x,y){
  var n=Math.min(x.length,y.length);
  var sx=0,sy=0,sxy=0,sx2=0;
  for(var i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sx2+=x[i]*x[i];}
  var b=(n*sxy-sx*sy)/(n*sx2-sx*sx), a=(sy-b*sx)/n;
  var ssr=0,sst=0,ym=sy/n;
  for(var i=0;i<n;i++){ssr+=Math.pow(a+b*x[i]-ym,2);sst+=Math.pow(y[i]-ym,2);}
  return{slope:b,intercept:a,r2:sst===0?0:ssr/sst};
}
